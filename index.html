<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>LUX-VENTUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
</head>
<body>
  <!-- ჰედერის ნაწილი -->
  <header class="main-header">
    <div class="logo">
      LUX <span class="highlight">VENTUS</span>
    </div>
    
    
    <nav class="nav-menu">
      <a href="#">Fashion</a>
      <a href="#">Lifestyle</a>
      <a href="#">Spiritual</a>
      <a href="#">Mental Health</a>
    </nav>
    
    <div class="header-actions">
      <button class="btn-contact">Contact Us</button>
      <button class="btn-search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
    </div>
  </header>
<section class="hero-section">
  <div class="hero-banner">
    
    <!-- სურათი -->
    <img src="Mask group.png" alt="Hero Background" class="hero-bg-img"> 
    <div class="hero-content">
      <span class="hero-subtitle">LUX VENTUS MAGAZINE</span>
      <h1 class="hero-title">We Are the <span class="text-blue">Ventus</span> <span class="text-fashion">Fashion</span></h1>
      <p class="hero-text">We like to gossip about everything, but we will never forget the daily fashion dose.</p>
    </div>
  </div> </section> 
</body>
<footer class="main-footer">
    <!-- ზედა მთავარი ზოლი -->
    <div class="footer-top">
        <div class="logo">
            LUX <span class="highlight">VENTUS</span>
        </div>
        
        <div class="footer-socials">
            <span class="social-title">Let's Hang Out</span>
            <div class="social-icons">
                <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-youtube"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <!-- ქვედა ხაზი (Copyright) -->
    <div class="footer-bottom">
        <p class="copyright">© 2023 - Lux Ventus by Zine.E.Falouti</p>
    </div>
</footer>
</html>
